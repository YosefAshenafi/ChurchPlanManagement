services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plansys}
      POSTGRES_USER: ${POSTGRES_USER:-plansys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plansys}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plansys}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET:-plansys-docs} || true;
      mc anonymous set none local/${MINIO_BUCKET:-plansys-docs} || true;
      exit 0;
      "

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER:-plansys}:${POSTGRES_PASSWORD:-plansys}@db:5432/${POSTGRES_DB:-plansys}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-plansys-docs}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./public:/app/public:ro
    ports:
      - "8001:8001"
    stop_grace_period: 5s
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo &&
             exec python manage.py runserver 0.0.0.0:8001"

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: http://localhost:8001/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./public/assets/logo.png:/app/src/assets/logo.png:ro
    ports:
      - "4300:4300"
    stop_grace_period: 5s
    stop_signal: SIGKILL
    command: npm run start -- --host 0.0.0.0 --port 4300 --poll 2000

volumes:
  db_data:
  minio_data:
