[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run gunicorn directly - no start.sh needed
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 1"
healthcheckPath = "/api/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
