[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Listen on Railway's PORT (supports your port 99)
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 1 --log-level debug"
healthcheckPath = "/api/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
