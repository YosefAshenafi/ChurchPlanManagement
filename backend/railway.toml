[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run gunicorn on port 8080 (Railway's default)
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:8080 --workers 1 --log-level debug"
healthcheckPath = "/api/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
